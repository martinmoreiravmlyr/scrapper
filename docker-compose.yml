services:
  postgres:
    image: postgres:16
    container_name: uru_scraper_postgres
    environment:
      POSTGRES_DB: uru_scraper
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql:/docker-entrypoint-initdb.d

  redis:
    image: redis:7
    container_name: uru_scraper_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
